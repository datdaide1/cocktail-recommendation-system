<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lounge - Premium Cocktail & Bar Discovery</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            light: '#e5c158',
                            DEFAULT: '#c5a059',
                            dark: '#aa7c11',
                        },
                        lounge: {
                            darkest: '#080b11',
                            dark: '#0c0f17',
                            card: '#121622',
                            border: '#1c2335',
                            text: '#f1f3f8',
                            muted: '#8b9bb4'
                        }
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom scrollbar for chat */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1c2335; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #c5a059; }
        /* Markdown Image styling inside chat */
        #chat-box img { max-width: 100%; border-radius: 0.75rem; margin-top: 10px; border: 1px solid #1c2335; }
    </style>
</head>
<body class="bg-lounge-darkest text-lounge-text font-montserrat h-screen flex flex-col overflow-hidden">

    <!-- Header Navigation -->
    <header class="bg-lounge-card border-b border-lounge-border px-6 py-4 flex justify-between items-center z-40 shadow-lg shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-3xl text-gold"><i class="fa-solid fa-martini-glass-citrus"></i></span>
            <div>
                <h1 class="font-cinzel font-bold text-2xl tracking-widest text-gold">AI LOUNGE</h1>
                <p class="text-[10px] text-lounge-muted uppercase tracking-widest">Intelligent Concierge</p>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="flex items-center gap-3">
            <button id="btn-toggle-lang" class="px-3 py-1.5 rounded-full text-xs font-bold border border-lounge-border bg-lounge-dark text-gold hover:bg-lounge-card transition-colors shadow-md">
                🌐 EN | VI
            </button>
            <button id="btn-toggle-panel" class="lg:hidden px-3 py-1.5 rounded-full text-xs font-bold bg-gold text-lounge-darkest flex items-center gap-2">
                <i class="fa-solid fa-compass"></i> Discover
            </button>
        </div>
    </header>

    <!-- Main Workspace (Split-Screen) -->
    <main class="flex-grow flex h-[calc(100vh-76px)] relative overflow-hidden">
        
        <!-- Left: Chat Interface -->
        <section id="chat-section" class="w-full lg:w-1/3 border-r border-lounge-border bg-lounge-darkest flex flex-col h-full z-20 transition-all duration-300">
            <!-- Chat Header / Controls -->
            <div class="p-4 border-b border-lounge-border bg-lounge-dark flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-gold text-xs"></i>
                    <select id="chat-session-select" class="bg-transparent text-xs font-bold text-gold uppercase tracking-widest border-none outline-none cursor-pointer w-32 sm:w-48 truncate">
                        <option value="" class="bg-lounge-dark text-gold">Loading...</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button id="btn-clear-chat" class="w-8 h-8 rounded-lg bg-lounge-darkest border border-lounge-border text-lounge-muted hover:text-red-400 hover:border-red-400 flex items-center justify-center transition-all shadow-sm" title="Clear Chat">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    <button id="btn-new-chat" class="w-8 h-8 rounded-lg bg-gold text-lounge-darkest hover:bg-gold-light flex items-center justify-center transition-all shadow-md" title="New Chat">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <!-- Chat Box -->
            <div id="chat-box" class="flex-grow p-6 overflow-y-auto space-y-6 scroll-smooth custom-scrollbar">
                <!-- Initial Message -->
                <div class="flex gap-4 max-w-[90%]">
                    <div class="w-10 h-10 rounded-full bg-gold bg-opacity-20 flex items-center justify-center text-gold flex-shrink-0 border border-gold border-opacity-30">
                        <i class="fa-solid fa-bell"></i>
                    </div>
                    <div class="bg-lounge-card p-4 rounded-2xl rounded-tl-none border border-lounge-border text-sm leading-relaxed shadow-lg">
                        Good evening. I am your <strong>AI Mixologist & Host</strong>. <br><br>
                        Whether you want to discover a hidden speakeasy, learn a classic recipe, or invent a completely new signature cocktail, I'm at your service. What are you in the mood for tonight?
                    </div>
                </div>
            </div>
            
            <!-- Chat Input Container -->
            <div class="p-4 bg-lounge-darkest shrink-0 border-t border-lounge-border">
                <div class="bg-lounge-card border border-lounge-border rounded-2xl p-2 flex gap-2 shadow-xl relative">
                    <input type="text" id="chat-input" placeholder="Ask for a recipe or venue..." class="flex-grow bg-transparent text-lounge-text px-4 py-3 text-sm focus:outline-none placeholder-lounge-muted">
                    <button id="btn-send-chat" class="bg-gold hover:bg-gold-light text-lounge-darkest w-12 h-12 rounded-xl font-bold transition-all duration-200 flex items-center justify-center shadow-md">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Right: Dynamic Discovery Panel (Artifacts / Grid) -->
        <section id="discovery-panel" class="fixed inset-y-0 right-0 w-full lg:static lg:w-2/3 bg-lounge-dark flex flex-col h-full transform translate-x-full lg:translate-x-0 transition-transform duration-300 z-30">
            
            <!-- Top Toolbar -->
            <div class="bg-lounge-card border-b border-lounge-border p-4 flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0 shadow-md">
                
                <!-- Close button on Mobile -->
                <button id="btn-close-panel" class="lg:hidden absolute top-4 right-4 text-lounge-muted hover:text-white">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>

                <div class="flex gap-4 w-full sm:w-auto">
                    <button id="tab-explore-cocktails" class="py-2 px-4 rounded-lg bg-lounge-dark border border-gold text-gold font-bold text-sm shadow-sm transition-all">
                        <i class="fa-solid fa-martini-glass-citrus mr-2"></i> Cocktails
                    </button>
                    <button id="tab-explore-bars" class="py-2 px-4 rounded-lg bg-transparent border border-transparent text-lounge-muted font-bold text-sm hover:text-lounge-text transition-all">
                        <i class="fa-solid fa-compass mr-2"></i> Venues
                    </button>
                </div>

                <div class="flex flex-wrap gap-2 w-full sm:w-auto justify-end pr-8 lg:pr-0">
                    <input type="text" id="grid-search-input" data-i18n="grid-search" placeholder="Search..." class="bg-lounge-darkest border border-lounge-border text-xs rounded-lg p-2 focus:border-gold outline-none w-32 sm:w-40 transition-all">
                    <select id="filter-flavor" class="cocktail-filter bg-lounge-darkest border border-lounge-border text-xs rounded-lg p-2 focus:border-gold outline-none">
                        <option value="">All Flavors</option>
                        <option value="Chua">Sour</option>
                        <option value="Ngọt">Sweet</option>
                        <option value="Đắng">Bitter</option>
                        <option value="Thảo mộc">Herbal</option>
                        <option value="Cân bằng">Balanced</option>
                    </select>
                    <select id="filter-city" class="bar-filter hidden bg-lounge-darkest border border-lounge-border text-xs rounded-lg p-2 focus:border-gold outline-none">
                        <option value="">All Cities</option>
                        <option value="Hanoi">Hanoi</option>
                        <option value="Ho Chi Minh City">HCMC</option>
                    </select>
                </div>
            </div>

            <!-- Map Container (Hidden initially) -->
            <div id="map-container" class="w-full h-64 border-b border-lounge-border hidden shrink-0 relative z-10"></div>

            <!-- Grid Content -->
            <div class="flex-grow p-6 overflow-y-auto custom-scrollbar">
                <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-20 text-lounge-muted">
                        <i class="fa-solid fa-compass text-4xl mb-4 opacity-30"></i>
                        <p>Awaiting AI Recommendations...</p>
                    </div>
                </div>
            </div>
        </section>
        
    </main>

    <!-- Detail Item Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-lounge-darkest bg-opacity-95 z-[80] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-lounge-card border border-lounge-border rounded-2xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-[0_0_40px_rgba(197,160,89,0.15)] overflow-hidden relative">
            <button id="btn-close-detail-modal" class="absolute top-4 right-4 z-10 w-8 h-8 bg-lounge-darkest hover:bg-lounge-dark rounded-full flex items-center justify-center text-lounge-muted hover:text-white transition-all">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="detail-modal-image-container" class="h-64 w-full relative shrink-0"></div>
            <div class="p-6 overflow-y-auto custom-scrollbar flex-grow bg-lounge-card relative">
                <div id="detail-modal-tags" class="flex flex-wrap gap-2 absolute top-6 right-6 justify-end w-1/2"></div>
                <h2 id="detail-modal-title" class="font-cinzel font-bold text-gold text-3xl mb-2 w-3/4">Title</h2>
                <p id="detail-modal-subtitle" class="text-sm text-lounge-muted uppercase tracking-wider mb-6"></p>
                <div id="detail-modal-description" class="text-lounge-text text-sm leading-relaxed mb-8 italic border-l-2 border-gold pl-4 opacity-90"></div>
                <div id="detail-modal-content-area" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
