<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightlife Concierge - Home</title>
    <link rel="stylesheet" href="shared.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <button class="lang-toggle" onclick="toggleLanguage()">EN / VI</button>

    <nav class="navbar">
        <a href="b2c_02_home.html" class="logo"><i class="fa-solid fa-martini-glass-citrus"></i> Nightlife Concierge</a>
        <div class="mode-toggle">
            <span class="mode-label b2c-label active">B2C Guest</span>
            <label class="switch">
                <input type="checkbox" onchange="toggleMode(this)">
                <span class="slider round"></span>
            </label>
            <span class="mode-label b2b-label">B2B Pro</span>
        </div>
    </nav>

    <div class="split-layout">
        <!-- Main Explore Area -->
        <div class="main-area">
            <h1 style="font-size: 2.5rem; margin-bottom: 24px;">Discover the Vibe</h1>
            
            <div style="background: var(--surface-dark); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between;">
                <div>
                    <h2 style="margin-bottom: 8px;">Not sure where to go?</h2>
                    <p style="color: var(--text-secondary);">Chat with our AI Concierge to find a spot that matches your exact mood.</p>
                </div>
                <a href="b2c_03_chat_assistant.html" class="btn btn-primary"><i class="fa-solid fa-sparkles"></i> Open AI Concierge</a>
            </div>

            <h2 style="margin-bottom: 16px;">Trending Now</h2>
            <div class="grid-container">
                <a href="b2c_04_venue_details.html" class="card">
                    <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=600&q=80')"></div>
                    <div class="card-info">
                        <h3>The Midnight Room</h3>
                        <p>Speakeasy • District 1</p>
                        <div style="color: #fbbf24; font-weight: 600;"><i class="fa-solid fa-star"></i> 4.9</div>
                    </div>
                </a>
                <a href="b2c_04_venue_details.html" class="card">
                    <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&w=600&q=80')"></div>
                    <div class="card-info">
                        <h3>Neon Lounge</h3>
                        <p>Rooftop • District 3</p>
                        <div style="color: #fbbf24; font-weight: 600;"><i class="fa-solid fa-star"></i> 4.7</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
    
    <script src="i18n.js"></script>
    <script src="shared.js"></script>
</body>
</html>
